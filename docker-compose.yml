services:
  postgres:
    image: postgres:16-alpine
    container_name: arc-credit-agent-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: arc_agent
      POSTGRES_PASSWORD: arc_agent_dev
      POSTGRES_DB: arc_credit_agent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arc_agent -d arc_credit_agent"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
